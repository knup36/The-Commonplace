<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
            <style>
                * { margin: 0; padding: 0; box-sizing: border-box; }
                body { background: #000000; overflow: hidden; width: 100vw; height: 100vh; }
                canvas { position: absolute; top: 0; left: 0; }
                svg { position: absolute; top: 0; left: 0; }
                #tooltip {
                    position: absolute;
                    background: rgba(26,18,8,0.92);
                    border: 0.5px solid rgba(168,144,96,0.3);
                    border-radius: 8px;
                    padding: 6px 10px;
                    font-family: -apple-system, sans-serif;
                    font-size: 12px;
                    color: #F0E8DC;
                    pointer-events: none;
                    opacity: 0;
                    transition: opacity 0.15s;
                    max-width: 160px;
                    white-space: nowrap;
                    overflow: hidden;
                    text-overflow: ellipsis;
                }
            </style>
    </head>
    <body>
        <div id="tooltip"></div>
        <svg id="graph"></svg>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
        <script>
            const W = window.innerWidth;
            const H = window.innerHeight;
            
            const svg = d3.select('#graph')
            .attr('width', W)
            .attr('height', H);
            
            const tooltip = document.getElementById('tooltip');
            
            // Zoom container
            const container = svg.append('g').attr('class', 'container');
            
            // Zoom behaviour
            const zoom = d3.zoom()
            .scaleExtent([0.1, 4])
            .on('zoom', e => {
                container.attr('transform', e.transform);
                currentScale = e.transform.k;
                updateLabelVisibility();
            });
            
            svg.call(zoom);
            
            let currentScale = 1;
            let simulation;
            let graphData = null;
            let links = [];
            
            function loadGraph(jsonString) {
                const data = JSON.parse(jsonString);
                graphData = data;
                renderGraph(data);
            }
            
            function renderGraph(data) {
                container.selectAll('*').remove();
                
                window.webkit.messageHandlers.entryTapped.postMessage('DEBUG persons: ' + JSON.stringify(data.persons?.slice(0,2)));
                const entryWithPerson = data.entries.find(e => e.tagNames && e.tagNames.some(t => t.startsWith('@')));
                window.webkit.messageHandlers.entryTapped.postMessage('DEBUG personEntry tags: ' + JSON.stringify(entryWithPerson?.tagNames));
                
                const entryNodes = data.entries.map(e => ({
                    id: e.id, kind: 'entry', label: e.label, color: e.color,
                    type: e.type, tagNames: e.tagNames, linkedEntryIDs: e.linkedEntryIDs, r: 9
                }));
                
                const tagNodes = data.tags.map(t => ({
                    id: t.id, kind: 'tag', label: t.label, entryCount: t.entryCount,
                    color: '#EF9F27', r: Math.max(14, Math.min(26, 10 + t.entryCount * 1.4))
                }));
                
                const personNodes = (data.persons || []).map(p => ({
                    id: p.id, kind: 'person', label: p.label, initials: p.initials, entryCount: p.entryCount, r: 14
                }));
                
                const nodes = [...entryNodes, ...tagNodes, ...personNodes];
                const nodeMap = new Map(nodes.map(n => [n.id, n]));
                
                links = [];
                
                for (const entry of data.entries) {
                    for (const tag of entry.tagNames) {
                        const tagId = 'tag-' + tag;
                        if (nodeMap.has(tagId)) {
                            links.push({ source: entry.id, target: tagId, kind: 'tag' });
                        }
                        const personId = 'person-' + tag.replace(/^@/, '');
                        if (tag.startsWith('@') && nodeMap.has(personId)) {
                            links.push({ source: entry.id, target: personId, kind: 'person' });
                        }
                    }
                }
                
                for (const entry of data.entries) {
                    for (const linkedId of entry.linkedEntryIDs) {
                        if (entry.id < linkedId && nodeMap.has(linkedId)) {
                            links.push({ source: entry.id, target: linkedId, kind: 'explicit' });
                        }
                    }
                }
                
                simulation = d3.forceSimulation(nodes)
                .force('link', d3.forceLink(links).id(d => d.id)
                       .distance(d => d.kind === 'person' ? 100 : d.kind === 'tag' ? 120 : 80)
                       .strength(d => d.kind === 'tag' ? 0.3 : 0.6))
                       .force('charge', d3.forceManyBody()
                                     .strength(d => d.kind === 'tag' || d.kind === 'person' ? -240 : -65))
                              .force('center', d3.forceCenter(W / 2, H / 2).strength(0.02))
                              .force('collision', d3.forceCollide().radius(d => d.r + 14))
                              .alphaDecay(0.03)
                              .on('end', () => { simulation.stop(); });
                              
                              const tagLinks = container.append('g').attr('class', 'tag-links')
                              .selectAll('line').data(links.filter(l => l.kind === 'tag')).join('line')
                              .attr('stroke', 'rgba(186,117,23,0.3)').attr('stroke-width', 1);
                              
                              const personLinks = container.append('g').attr('class', 'person-links')
                              .selectAll('line').data(links.filter(l => l.kind === 'person')).join('line')
                              .attr('stroke', 'rgba(200,144,58,0.35)').attr('stroke-width', 1);
                              
                              const explicitLinks = container.append('g').attr('class', 'explicit-links')
                              .selectAll('line').data(links.filter(l => l.kind === 'explicit')).join('line')
                              .attr('stroke', 'rgba(240,232,220,0.35)').attr('stroke-width', 1.5)
                              .attr('stroke-dasharray', '4 3');
                              
                              const nodeGroup = container.append('g').attr('class', 'nodes')
                              .selectAll('g').data(nodes).join('g').attr('class', 'node')
                              .call(d3.drag()
                                    .on('start', dragStart)
                                    .on('drag', dragged)
                                    .on('end', dragEnd))
                                    .on('click', (event, d) => {
                                        event.stopPropagation();
                                        if (d.kind === 'entry') {
                                            window.webkit.messageHandlers.entryTapped.postMessage(d.id);
                                            highlightNode(d.id);
                                        } else if (d.kind === 'tag' || d.kind === 'person') {
                                            if (d.kind === 'person') togglePersonName(d.id);
                                            highlightHub(d.id);
                                        }
                                    })
                                    .on('touchstart', (event, d) => {
                                        tooltip.style.opacity = '1';
                                        tooltip.textContent = d.label;
                                        tooltip.style.left = (event.touches[0].pageX + 12) + 'px';
                                        tooltip.style.top = (event.touches[0].pageY - 28) + 'px';
                                        setTimeout(() => { tooltip.style.opacity = '0'; }, 1500);
                                    }, { passive: true });
                                    
                                    nodeGroup.filter(d => d.kind === 'entry')
                                    .append('circle')
                                    .attr('r', d => d.r)
                                    .attr('fill', d => d.color)
                                    .attr('fill-opacity', 0.85)
                                    .attr('stroke', d => d.color)
                                    .attr('stroke-width', 1);
                                    
                                    nodeGroup.filter(d => d.kind === 'person')
                                    .append('circle')
                                    .attr('r', d => d.r)
                                    .attr('fill', 'rgba(200,144,58,0.15)')
                                    .attr('stroke', '#C8903A')
                                    .attr('stroke-width', 2);
                                    
                                    nodeGroup.filter(d => d.kind === 'person')
                                    .append('text')
                                    .attr('text-anchor', 'middle')
                                    .attr('dy', '0.35em')
                                    .attr('font-size', 10)
                                    .attr('font-weight', '600')
                                    .attr('fill', '#C8903A')
                                    .attr('pointer-events', 'none')
                                    .text(d => d.initials || '?');

                                    nodeGroup.filter(d => d.kind === 'person')
                                    .append('rect')
                                    .attr('class', 'person-name-bg')
                                    .attr('rx', 4)
                                    .attr('ry', 4)
                                    .attr('fill', 'rgba(26,18,8,0.92)')
                                    .attr('stroke', 'rgba(200,144,58,0.4)')
                                    .attr('stroke-width', 0.5)
                                    .attr('y', d => d.r + 6)
                                    .attr('opacity', 0)
                                    .attr('pointer-events', 'none');

                                    nodeGroup.filter(d => d.kind === 'person')
                                    .append('text')
                                    .attr('class', 'person-name-label')
                                    .attr('text-anchor', 'middle')
                                    .attr('y', d => d.r + 6)
                                    .attr('dy', '1em')
                                    .attr('font-size', 11)
                                    .attr('font-weight', '500')
                                    .attr('fill', '#C8903A')
                                    .attr('opacity', 0)
                                    .attr('pointer-events', 'none')
                                    .text(d => d.label);
                                    
                                    nodeGroup.filter(d => d.kind === 'tag')
                                    .append('circle')
                                    .attr('r', d => d.r)
                                    .attr('fill', 'transparent')
                                    .attr('stroke', 'none');
                                    
                                    nodeGroup.filter(d => d.kind === 'tag')
                                    .append('text')
                                    .attr('class', 'tag-label')
                                    .attr('text-anchor', 'middle')
                                    .attr('dy', '0.35em')
                                    .attr('font-size', 13)
                                    .attr('font-weight', '500')
                                    .attr('fill', '#EF9F27')
                                    .attr('fill-opacity', 0.9)
                                    .attr('pointer-events', 'none')
                                    .text(d => d.label.length > 18 ? d.label.slice(0, 17) + '…' : d.label);
                                    
                                    nodeGroup.filter(d => d.kind === 'entry')
                                    .append('text')
                                    .attr('class', 'entry-label')
                                    .attr('text-anchor', 'middle')
                                    .attr('dy', d => d.r + 11)
                                    .attr('font-size', 9)
                                    .attr('fill', 'rgba(240,232,220,0.6)')
                                    .attr('pointer-events', 'none')
                                    .text(d => {
                                        const chars = [...d.label];
                                        return chars.length > 24 ? chars.slice(0, 23).join('') + '...' : d.label;
                                    })
                                    .attr('opacity', 0);
                                    
                                    nodeGroup.filter(d => d.kind === 'entry')
                                    .append('circle')
                                    .attr('class', 'selected-ring')
                                    .attr('r', d => d.r + 4)
                                    .attr('fill', 'none')
                                    .attr('stroke', d => d.color)
                                    .attr('stroke-width', 1.5)
                                    .attr('opacity', 0);
                                    
                                    simulation.on('tick', () => {
                                        tagLinks
                                        .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
                                        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
                                        personLinks
                                        .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
                                        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
                                        explicitLinks
                                        .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
                                        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
                                        nodeGroup.attr('transform', d => `translate(${d.x},${d.y})`);
                                    });
            }
            
            let activeHubId = null;

            function highlightNode(id) {
                container.selectAll('.selected-ring').attr('opacity', 0);
                container.selectAll('.node')
                    .filter(d => d.id === id)
                    .select('.selected-ring')
                    .attr('opacity', 1);
            }

            function highlightHub(id) {
                // Toggle off if tapping the same hub
                if (activeHubId === id) {
                    activeHubId = null;
                    clearHubHighlight();
                    return;
                }
                activeHubId = id;

                // Find all entry IDs directly connected to this hub
                const connectedEntryIds = new Set();
                links.forEach(l => {
                    const sourceId = l.source.id || l.source;
                    const targetId = l.target.id || l.target;
                    if (sourceId === id) connectedEntryIds.add(targetId);
                    if (targetId === id) connectedEntryIds.add(sourceId);
                });

                // Dim all nodes, brighten hub and its entries
                container.selectAll('.node')
                    .attr('opacity', d => {
                        if (d.id === id) return 1;
                        if (connectedEntryIds.has(d.id)) return 1;
                        return 0.12;
                    });

                // Dim all links, brighten links connected to this hub
                container.selectAll('line')
                    .attr('opacity', l => {
                        const sourceId = l.source.id || l.source;
                        const targetId = l.target.id || l.target;
                        if (sourceId === id || targetId === id) return 1;
                        return 0.04;
                    });
            }

            function clearHubHighlight() {
                container.selectAll('.node').attr('opacity', 1);
                container.selectAll('line').attr('opacity', 1);
            }
            
            function togglePersonName(id) {
                const node = container.selectAll('.node').filter(d => d.id === id);
                const label = node.select('.person-name-label');
                const bg = node.select('.person-name-bg');
                const isVisible = parseFloat(label.attr('opacity')) > 0;

                if (isVisible) {
                    label.attr('opacity', 0);
                    bg.attr('opacity', 0);
                } else {
                    // Measure text width to size the background rect
                    const textEl = label.node();
                    const bbox = textEl ? textEl.getBBox() : { width: 60, height: 14 };
                    const pad = 6;
                    bg.attr('x', -(bbox.width / 2) - pad)
                      .attr('width', bbox.width + pad * 2)
                      .attr('height', bbox.height + pad)
                      .attr('opacity', 1);
                    label.attr('opacity', 1);
                }
            }
            
            function updateLabelVisibility() {
                const showLabels = currentScale > 1.4;
                container.selectAll('.entry-label')
                .attr('opacity', showLabels ? 1 : 0);
            }
            
            function dragStart(event, d) {
                if (!event.active) simulation.alphaTarget(0.1).restart();
                d.fx = d.x;
                d.fy = d.y;
            }
            
            function dragged(event, d) {
                d.fx = event.x;
                d.fy = event.y;
            }
            
            function dragEnd(event, d) {
                if (!event.active) simulation.alphaTarget(0);
                d.fx = d.x;
                d.fy = d.y;
            }
            
            // Tap on empty canvas deselects
            svg.on('click', () => {
                container.selectAll('.selected-ring').attr('opacity', 0);
                if (activeHubId) return;
                clearHubHighlight();
            });
        </script>
    </body>
</html>
